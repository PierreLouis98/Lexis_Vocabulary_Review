<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lexis — Révision de vocabulaire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0F1115; color: #F4F5F8; }
    #root { height: 100%; }
    button { font-family: inherit; border: none; cursor: pointer; }
    input { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Design tokens
    const LX = {
      bg: '#0F1115',
      surface: '#181B22',
      surfaceElev: '#1F232C',
      border: 'rgba(255,255,255,0.07)',
      text: '#F4F5F8',
      textDim: '#9CA3B4',
      textMuted: '#5E6473',
      blue: '#5B8BFF',
      blueDeep: '#3A6AE6',
      blueGlow: 'rgba(91,139,255,0.25)',
      lime: '#B8F26A',
      limeDeep: '#86C73B',
      coral: '#FF6B6B',
      amber: '#FFB547',
      violet: '#C88CFF',
      cat: {
        adjectif: '#FFB547',
        verbe: '#5B8BFF',
        nom: '#B8F26A',
        adverbe: '#C88CFF',
        expression: '#FF6B6B',
      },
    };

    // Icons
    const Icon = {
      flame: (c = LX.amber, s = 18) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill={c}>
          <path d="M12 2c-1 3-4 5-4 9a4 4 0 008 0c0-2-1-3-1-5 2 1 3 3 3 6a6 6 0 11-12 0c0-4 3-6 6-10z"/>
        </svg>
      ),
      home: (c, s = 22) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 11L12 3l9 8v10a1 1 0 01-1 1h-5v-7h-6v7H4a1 1 0 01-1-1V11z"/>
        </svg>
      ),
      library: (c, s = 22) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M4 4h4v16H4zM10 6h4v14h-4zM15.5 8l3.5-1 3 13-3.5 1z"/>
        </svg>
      ),
      x: (c = '#fff', s = 18) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="3" strokeLinecap="round">
          <path d="M6 6l12 12M18 6L6 18"/>
        </svg>
      ),
      check: (c = '#fff', s = 18) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
          <path d="M5 12l5 5 9-11"/>
        </svg>
      ),
      sparkle: (c, s = 18) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill={c}>
          <path d="M12 2l1.8 5.8L19.5 9.5l-5.7 1.8L12 17l-1.8-5.8L4.5 9.5l5.8-1.7z"/>
        </svg>
      ),
      chevR: (c, s = 16) => (
        <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke={c} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M9 6l6 6-6 6"/>
        </svg>
      ),
    };

    // Mock data
    const WORDS = [
      { id: 'w1', word: 'onomatopée', type: 'nom', definition: "Mot dont le son imite la chose qu'il désigne.", level: 'mastered', streak: 12 },
      { id: 'w2', word: 'scintiller', type: 'verbe', definition: "Briller d'un éclat vif et tremblant.", level: 'mastered', streak: 8 },
      { id: 'w3', word: 'badinage', type: 'nom', definition: 'Échange de propos légers, plaisanterie douce.', level: 'learning', streak: 3 },
      { id: 'w4', word: 'pérégrination', type: 'nom', definition: 'Voyage long, à travers plusieurs endroits.', level: 'learning', streak: 2 },
      { id: 'w5', word: 'sagace', type: 'adjectif', definition: 'Qui a une intelligence vive, perspicace.', level: 'learning', streak: 1 },
      { id: 'w6', word: 'chatoyant', type: 'adjectif', definition: "Qui change de couleur ou de reflet selon l'éclairage.", level: 'mastered', streak: 15 },
      { id: 'w7', word: 'ineffable', type: 'adjectif', definition: 'Qui ne peut être exprimé par des mots.', level: 'learning', streak: 4 },
      { id: 'w8', word: 'flâner', type: 'verbe', definition: 'Se promener sans but, en prenant son temps.', level: 'mastered', streak: 20 },
      { id: 'w9', word: 'palimpseste', type: 'nom', definition: "Parchemin effacé pour être réutilisé ; strates successives.", level: 'new', streak: 0 },
      { id: 'w10', word: 'sempiternel', type: 'adjectif', definition: 'Qui dure ou semble durer sans fin.', level: 'learning', streak: 2 },
      { id: 's1', word: 'velléité', type: 'nom', definition: 'Intention faible, sans suite concrète.', level: 'suggested' },
      { id: 's2', word: 'ubuesque', type: 'adjectif', definition: 'Absurde et grotesque, à la manière du roi Ubu.', level: 'suggested' },
      { id: 's3', word: 'pusillanime', type: 'adjectif', definition: 'Qui manque de courage, timoré.', level: 'suggested' },
      { id: 's4', word: 'gabegie', type: 'nom', definition: "Gâchis, mauvaise gestion d'un ensemble.", level: 'suggested' },
      { id: 's5', word: 'opiniâtre', type: 'adjectif', definition: 'Tenace, qui ne renonce jamais.', level: 'suggested' },
      { id: 's6', word: 'saugrenu', type: 'adjectif', definition: 'Bizarre, inattendu, absurde.', level: 'suggested' },
    ];

    const DAILY_SEQUENCE = [
      { type: 'truefalse', word: 'scintiller', def: "Briller d'un éclat vif et tremblant.", isCorrect: true },
      { type: 'multiple', word: 'sagace', correctIdx: 2, choices: ["Qui parle beaucoup", "Qui agit sans réfléchir", "Qui a une intelligence vive", "Qui est en colère"] },
      { type: 'fillblank', before: 'Un observateur ', after: ' aurait remarqué ce détail.', choices: ['sagace', 'sempiternel', 'opiniâtre', 'ubuesque'], correctIdx: 0 },
      { type: 'input', def: 'Qui ne peut être exprimé par des mots.', answer: 'ineffable' },
      { type: 'match', pairs: [
        { word: 'flâner', def: 'Se promener sans but' },
        { word: 'susurrer', def: "Murmurer à l'oreille" },
        { word: 'scintiller', def: "Briller d'un éclat tremblant" },
        { word: 'badinage', def: 'Échange de propos légers' },
      ]},
    ];

    // Components
    function Logo({ size = 36 }) {
      return (
        <div style={{ display: 'inline-flex', alignItems: 'center', gap: 8 }}>
          <div style={{
            width: size, height: size, borderRadius: size * 0.28,
            background: `linear-gradient(135deg, ${LX.blue} 0%, ${LX.blueDeep} 100%)`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: '#fff', fontWeight: 900, fontSize: size * 0.58,
            fontFamily: 'Georgia, serif', letterSpacing: -1,
            boxShadow: `0 8px 22px ${LX.blueGlow}`, position: 'relative',
          }}>
            L
            <span style={{
              position: 'absolute', right: size * 0.18, bottom: size * 0.22,
              width: size * 0.14, height: size * 0.14, borderRadius: '50%', background: LX.lime,
            }} />
          </div>
        </div>
      );
    }

    function PillBtn({ children, onClick, variant = 'primary', disabled, style = {} }) {
      const variants = {
        primary: { bg: LX.blue, color: '#fff', shadow: `0 4px 0 ${LX.blueDeep}` },
        lime: { bg: LX.lime, color: '#0A1020', shadow: `0 4px 0 ${LX.limeDeep}` },
      }[variant];
      return (
        <button onClick={onClick} disabled={disabled} style={{
          padding: '16px 22px', borderRadius: 16, fontSize: 16, fontWeight: 700,
          background: variants.bg, color: variants.color, boxShadow: variants.shadow,
          cursor: disabled ? 'default' : 'pointer', opacity: disabled ? 0.45 : 1, ...style,
        }}>
          {children}
        </button>
      );
    }

    function Tag({ type }) {
      const color = LX.cat[type] || LX.textDim;
      return (
        <span style={{
          display: 'inline-block', padding: '2px 8px', borderRadius: 6,
          background: `${color}22`, color, fontSize: 10, fontWeight: 700,
          textTransform: 'uppercase', letterSpacing: 0.8,
        }}>{type}</span>
      );
    }

    function TabBar({ tab, onTab }) {
      const Btn = ({ id, icon, label }) => {
        const active = tab === id;
        return (
          <button onClick={() => onTab(id)} style={{
            flex: 1, padding: '8px 0 4px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
            background: 'none', border: 'none', cursor: 'pointer', color: active ? LX.blue : LX.textMuted,
          }}>
            {icon(active ? LX.blue : LX.textMuted, 22)}
            <span style={{ fontSize: 10, fontWeight: 700 }}>{label}</span>
          </button>
        );
      };
      return (
        <div style={{
          position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 30,
          background: 'rgba(15,17,21,0.92)', backdropFilter: 'blur(20px)',
          borderTop: `1px solid ${LX.border}`,
          display: 'flex', padding: '6px 0 14px',
        }}>
          <Btn id="home" icon={Icon.home} label="Accueil" />
          <Btn id="library" icon={Icon.library} label="Mots" />
        </div>
      );
    }

    // Screens
    function Login({ onLogin }) {
      const [pseudo, setPseudo] = useState('');
      const [password, setPassword] = useState('');
      const canSubmit = pseudo.trim().length >= 3 && password.length >= 3;

      return (
        <div style={{
          minHeight: '100vh', background: LX.bg, color: LX.text,
          display: 'flex', flexDirection: 'column', padding: '48px 28px',
          position: 'relative', overflow: 'hidden',
        }}>
          <div style={{ position: 'absolute', top: -100, left: -100, width: 300, height: 300, borderRadius: '50%', background: `radial-gradient(${LX.blueGlow}, transparent 70%)`, pointerEvents: 'none' }} />

          <div style={{ marginTop: 60 }}>
            <Logo size={56} />
            <div style={{ marginTop: 28, fontSize: 38, fontWeight: 900, letterSpacing: -1.2, lineHeight: 1.05 }}>
              Bon retour<br/><span style={{ color: LX.blue }}>parmi les mots.</span>
            </div>
          </div>

          <div style={{ marginTop: 48, display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <label style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', color: LX.textDim }}>Pseudo</label>
              <input value={pseudo} onChange={(e) => setPseudo(e.target.value)} placeholder="alexlex"
                style={{ padding: '20px', borderRadius: 18, border: `2px solid ${pseudo ? LX.blue : LX.border}`, background: LX.surface, color: LX.text, fontSize: 18, outline: 'none', boxSizing: 'border-box' }} />
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <label style={{ fontSize: 12, fontWeight: 700, textTransform: 'uppercase', color: LX.textDim }}>Mot de passe</label>
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="••••••••"
                style={{ padding: '20px', borderRadius: 18, border: `2px solid ${password ? LX.blue : LX.border}`, background: LX.surface, color: LX.text, fontSize: 18, outline: 'none', boxSizing: 'border-box', width: '100%' }} />
            </div>
          </div>

          <div style={{ marginTop: 'auto', paddingTop: 32 }}>
            <PillBtn disabled={!canSubmit} onClick={() => onLogin(pseudo)} style={{ width: '100%', padding: '18px' }}>
              Se connecter
            </PillBtn>
          </div>
        </div>
      );
    }

    function Home({ user, onGoto }) {
      return (
        <div style={{ background: LX.bg, color: LX.text, overflowY: 'auto', paddingBottom: 100 }}>
          <div style={{ padding: '56px 24px 0', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <div>
              <div style={{ fontSize: 13, color: LX.textDim }}>Salut 👋</div>
              <div style={{ fontSize: 26, fontWeight: 900, marginTop: 2 }}>{user.prenom}</div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '8px 14px', background: 'rgba(255,181,71,0.12)', borderRadius: 999 }}>
              {Icon.flame(LX.amber, 18)}
              <span style={{ color: LX.amber, fontWeight: 800, fontSize: 17 }}>{user.streak}</span>
            </div>
          </div>

          <div style={{ padding: '28px 20px 0' }}>
            <div style={{
              background: `linear-gradient(135deg, ${LX.blue} 0%, ${LX.blueDeep} 100%)`,
              borderRadius: 24, padding: '22px', position: 'relative', overflow: 'hidden',
            }}>
              <div style={{ position: 'relative' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 6, color: 'rgba(255,255,255,0.8)', fontSize: 12, fontWeight: 700, textTransform: 'uppercase' }}>
                  {Icon.sparkle('#fff', 14)} Exercice du jour
                </div>
                <div style={{ marginTop: 6, fontSize: 28, fontWeight: 900, color: '#fff', lineHeight: 1.1 }}>5 mots · 3 min</div>
                <button onClick={() => onGoto('exercise')} style={{
                  marginTop: 18, width: '100%', padding: '16px 0',
                  background: '#0A1020', color: '#fff', border: 'none', borderRadius: 14,
                  fontSize: 16, fontWeight: 800, cursor: 'pointer', boxShadow: '0 4px 0 rgba(0,0,0,0.4)',
                }}>
                  Commencer →
                </button>
              </div>
            </div>
          </div>

          <div style={{ padding: '20px' }}>
            <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 12 }}>Stats</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
              {[
                { label: 'Maîtrisés', value: '127', color: LX.lime },
                { label: 'En cours', value: '34', color: LX.blue },
                { label: 'Streak', value: user.streak, color: LX.amber },
                { label: 'Niveau', value: user.level, color: LX.violet },
              ].map(({ label, value, color }) => (
                <div key={label} style={{
                  background: LX.surface, border: `1px solid ${LX.border}`,
                  borderRadius: 18, padding: '14px', display: 'flex', flexDirection: 'column', gap: 6,
                }}>
                  <span style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', color: LX.textDim }}>{label}</span>
                  <span style={{ fontSize: 26, fontWeight: 900, color }}>{value}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function Library() {
      const [filter, setFilter] = useState('all');
      const mine = WORDS.filter((w) => w.level !== 'suggested');
      const filtered = mine.filter((w) => filter === 'all' || w.level === filter);

      return (
        <div style={{ background: LX.bg, color: LX.text, overflowY: 'auto', paddingBottom: 100 }}>
          <div style={{ padding: '56px 24px 0' }}>
            <div style={{ fontSize: 28, fontWeight: 900 }}>Bibliothèque</div>
            <div style={{ fontSize: 13, color: LX.textDim, marginTop: 2 }}>{mine.length} mots</div>
          </div>

          <div style={{ padding: '14px 20px 0', display: 'flex', gap: 8, overflowX: 'auto' }}>
            {[{ id: 'all', label: 'Tous', c: LX.text }, { id: 'mastered', label: 'Maîtrisés', c: LX.lime }, { id: 'learning', label: 'En cours', c: LX.amber }].map((f) => (
              <button key={f.id} onClick={() => setFilter(f.id)} style={{
                padding: '8px 14px', borderRadius: 999, fontSize: 13, fontWeight: 700, whiteSpace: 'nowrap',
                background: filter === f.id ? f.c : LX.surface,
                color: filter === f.id ? '#0A1020' : LX.textDim,
                border: `1px solid ${filter === f.id ? f.c : LX.border}`,
                cursor: 'pointer',
              }}>
                {f.label}
              </button>
            ))}
          </div>

          <div style={{ padding: '20px' }}>
            {filtered.map((w) => {
              const lc = w.level === 'mastered' ? LX.lime : w.level === 'learning' ? LX.amber : LX.violet;
              return (
                <div key={w.id} style={{
                  background: LX.surface, border: `1px solid ${LX.border}`, borderRadius: 14,
                  padding: '12px 14px', display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8,
                }}>
                  <div style={{ width: 32, height: 32, borderRadius: 10, background: lc + '20', color: lc, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 800 }}>
                    {w.level === 'mastered' ? '★' : w.streak}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <div style={{ fontSize: 16, fontWeight: 700 }}>{w.word}</div>
                      <Tag type={w.type} />
                    </div>
                    <div style={{ fontSize: 12, color: LX.textDim, marginTop: 2 }}>{w.definition}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function Exercise({ onDone, onExit }) {
      const [idx, setIdx] = useState(0);
      const [correct, setCorrect] = useState(0);
      const total = DAILY_SEQUENCE.length;
      const step = DAILY_SEQUENCE[idx];
      const pct = (idx / total) * 100;

      const next = (wasCorrect) => {
        const newCorrect = correct + (wasCorrect ? 1 : 0);
        if (idx + 1 >= total) {
          onDone({ correct: newCorrect, total });
        } else {
          if (wasCorrect) setCorrect(newCorrect);
          setTimeout(() => setIdx((i) => i + 1), 300);
        }
      };

      return (
        <div style={{ minHeight: '100vh', background: LX.bg, color: LX.text, display: 'flex', flexDirection: 'column' }}>
          <div style={{ padding: '56px 20px 16px', display: 'flex', alignItems: 'center', gap: 12 }}>
            <button onClick={onExit} style={{
              width: 36, height: 36, borderRadius: 10, border: 'none',
              background: LX.surface, color: LX.text, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              {Icon.x(LX.textDim, 16)}
            </button>
            <div style={{ flex: 1, height: 10, background: LX.surface, borderRadius: 999, overflow: 'hidden' }}>
              <div style={{ width: `${pct}%`, height: '100%', background: `linear-gradient(90deg, ${LX.blue}, ${LX.lime})`, transition: 'width .4s' }} />
            </div>
            <div style={{ fontSize: 12, fontWeight: 800, color: LX.textDim }}>{idx + 1}/{total}</div>
          </div>

          <div style={{ flex: 1, padding: '12px 24px 28px', display: 'flex', flexDirection: 'column', overflowY: 'auto' }}>
            {step.type === 'truefalse' && <XTrueFalse {...step} onAnswer={next} />}
            {step.type === 'multiple' && <XMultiple {...step} onAnswer={next} />}
            {step.type === 'fillblank' && <XFillBlank {...step} onAnswer={next} />}
            {step.type === 'input' && <XInput {...step} onAnswer={next} />}
            {step.type === 'match' && <XMatch {...step} onAnswer={next} />}
          </div>
        </div>
      );
    }

    function XTrueFalse({ word, def, isCorrect, onAnswer }) {
      const [picked, setPicked] = useState(null);
      const pick = (choice) => {
        if (picked !== null) return;
        setPicked(choice);
        setTimeout(() => onAnswer(choice === isCorrect), 900);
      };
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
          <div style={{ textAlign: 'center' }}>
            <div style={{ color: LX.textDim, fontSize: 13, textTransform: 'uppercase', fontWeight: 600 }}>Vrai ou faux ?</div>
            <div style={{ marginTop: 18, fontSize: 32, fontWeight: 800 }}>{word}</div>
          </div>
          <div style={{ background: LX.surfaceElev, borderRadius: 20, padding: '22px 20px', border: `1px solid ${LX.border}`, fontSize: 17, lineHeight: 1.5, textAlign: 'center' }}>
            « {def} »
          </div>
          <div style={{ display: 'flex', gap: 12 }}>
            <button onClick={() => pick(false)} style={{
              flex: 1, padding: '20px 0', borderRadius: 18, fontSize: 18, fontWeight: 700,
              border: `2px solid ${picked === false ? (picked === isCorrect ? LX.lime : LX.coral) : LX.border}`,
              background: picked === false ? (picked === isCorrect ? 'rgba(184,242,106,0.12)' : 'rgba(255,107,107,0.12)') : LX.surfaceElev,
              color: picked === false ? (picked === isCorrect ? LX.lime : LX.coral) : LX.text,
            }}>
              Faux
            </button>
            <button onClick={() => pick(true)} style={{
              flex: 1, padding: '20px 0', borderRadius: 18, fontSize: 18, fontWeight: 700,
              border: `2px solid ${picked === true ? (picked === isCorrect ? LX.lime : LX.coral) : LX.border}`,
              background: picked === true ? (picked === isCorrect ? 'rgba(184,242,106,0.12)' : 'rgba(255,107,107,0.12)') : LX.surfaceElev,
              color: picked === true ? (picked === isCorrect ? LX.lime : LX.coral) : LX.text,
            }}>
              Vrai
            </button>
          </div>
        </div>
      );
    }

    function XMultiple({ word, choices, correctIdx, onAnswer }) {
      const [picked, setPicked] = useState(null);
      const pick = (i) => {
        if (picked !== null) return;
        setPicked(i);
        setTimeout(() => onAnswer(i === correctIdx), 900);
      };
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
          <div>
            <div style={{ color: LX.textDim, fontSize: 13, textTransform: 'uppercase', fontWeight: 600 }}>Quelle est la définition de</div>
            <div style={{ marginTop: 10, fontSize: 34, fontWeight: 800 }}>{word}</div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {choices.map((c, i) => (
              <button key={i} onClick={() => pick(i)} style={{
                padding: '16px 18px', borderRadius: 16, fontSize: 16, fontWeight: 500, textAlign: 'left',
                border: `2px solid ${picked === null ? LX.border : i === correctIdx ? LX.lime : i === picked ? LX.coral : LX.border}`,
                background: picked === null ? LX.surfaceElev : i === correctIdx ? 'rgba(184,242,106,0.12)' : i === picked ? 'rgba(255,107,107,0.12)' : LX.surface,
                color: picked === null ? LX.text : i === correctIdx ? LX.lime : i === picked ? LX.coral : LX.textMuted,
              }}>
                {['A', 'B', 'C', 'D'][i]}. {c}
              </button>
            ))}
          </div>
        </div>
      );
    }

    function XFillBlank({ before, after, choices, correctIdx, onAnswer }) {
      const [picked, setPicked] = useState(null);
      const pick = (i) => {
        if (picked !== null) return;
        setPicked(i);
        setTimeout(() => onAnswer(i === correctIdx), 900);
      };
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
          <div style={{ color: LX.textDim, fontSize: 13, textTransform: 'uppercase', fontWeight: 600 }}>Complète la phrase</div>
          <div style={{ background: LX.surfaceElev, borderRadius: 18, padding: '24px 20px', fontSize: 18, lineHeight: 1.7 }}>
            {before}
            <span style={{
              display: 'inline-block', minWidth: 70, padding: '2px 14px', margin: '0 4px',
              borderBottom: `2px solid ${picked !== null ? (picked === correctIdx ? LX.lime : LX.coral) : LX.blue}`,
              color: picked !== null ? (picked === correctIdx ? LX.lime : LX.coral) : LX.blue,
              fontWeight: 700, fontStyle: 'italic',
            }}>
              {picked !== null ? choices[picked] : '···'}
            </span>
            {after}
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            {choices.map((c, i) => (
              <button key={i} onClick={() => pick(i)} style={{
                padding: '16px 18px', borderRadius: 16, fontSize: 16, fontWeight: 500,
                border: `2px solid ${picked === null ? LX.border : i === correctIdx ? LX.lime : i === picked ? LX.coral : LX.border}`,
                background: picked === null ? LX.surfaceElev : i === correctIdx ? 'rgba(184,242,106,0.12)' : i === picked ? 'rgba(255,107,107,0.12)' : LX.surface,
                color: picked === null ? LX.text : i === correctIdx ? LX.lime : i === picked ? LX.coral : LX.textMuted,
              }}>
                {c}
              </button>
            ))}
          </div>
        </div>
      );
    }

    function XInput({ def, answer, onAnswer }) {
      const [val, setVal] = useState('');
      const [checked, setChecked] = useState(null);
      const norm = (s) => s.toLowerCase().trim().replace(/[éèê]/g, 'e').replace(/[àâ]/g, 'a');
      const submit = () => {
        if (!val.trim() || checked !== null) return;
        const ok = norm(val) === norm(answer);
        setChecked(ok);
        setTimeout(() => onAnswer(ok), 1100);
      };
      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 22 }}>
          <div>
            <div style={{ color: LX.textDim, fontSize: 13, textTransform: 'uppercase', fontWeight: 600 }}>Écris le mot</div>
            <div style={{ marginTop: 6, fontSize: 20, fontWeight: 700 }}>qui correspond à cette définition</div>
          </div>
          <div style={{ background: LX.surfaceElev, borderRadius: 18, padding: '20px', border: `1px solid ${LX.border}`, fontSize: 16, lineHeight: 1.55 }}>
            « {def} »
          </div>
          <input value={val} onChange={(e) => setVal(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && submit()} placeholder="ta réponse…"
            style={{
              padding: '18px 20px', borderRadius: 16, border: `2px solid ${checked === true ? LX.lime : checked === false ? LX.coral : val ? LX.blue : LX.border}`,
              background: LX.surface, color: LX.text, fontSize: 20, fontWeight: 600, outline: 'none', boxSizing: 'border-box',
            }} />
          {checked === true && <div style={{ color: LX.lime, fontSize: 13 }}>✓ Parfait !</div>}
          {checked === false && <div style={{ color: LX.coral, fontSize: 13 }}>✗ Réponse : {answer}</div>}
          <button onClick={submit} disabled={!val.trim() || checked !== null} style={{
            marginTop: 'auto', padding: '16px 0', borderRadius: 16, border: 'none',
            background: val.trim() && !checked ? LX.blue : LX.surfaceElev,
            color: val.trim() && !checked ? '#fff' : LX.textMuted,
            fontSize: 16, fontWeight: 700, cursor: val.trim() && !checked ? 'pointer' : 'default',
          }}>
            Valider
          </button>
        </div>
      );
    }

    function XMatch({ pairs, onAnswer }) {
      const [selWord, setSelWord] = useState(null);
      const [selDef, setSelDef] = useState(null);
      const [matches, setMatches] = useState({});

      const defs = useMemo(() => {
        const arr = pairs.map((p, i) => ({ def: p.def, origIdx: i }));
        for (let i = arr.length - 1; i > 0; i--) {
          const j = (i * 7 + 3) % (i + 1);
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }, []);

      useEffect(() => {
        if (selWord !== null && selDef !== null) {
          if (defs[selDef].origIdx === selWord) {
            const next = { ...matches, [selWord]: selDef };
            setMatches(next);
            if (Object.keys(next).length === pairs.length) setTimeout(() => onAnswer(true), 300);
          }
          setSelWord(null);
          setSelDef(null);
        }
      }, [selWord, selDef]);

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          <div>
            <div style={{ color: LX.textDim, fontSize: 13, textTransform: 'uppercase', fontWeight: 600 }}>Associe</div>
            <div style={{ marginTop: 6, fontSize: 22, fontWeight: 700 }}>Chaque mot à sa définition</div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1.3fr', gap: 10 }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {pairs.map((p, i) => (
                <button key={i} disabled={i in matches} onClick={() => !(i in matches) && setSelWord(i)} style={{
                  padding: '14px 12px', borderRadius: 14, fontSize: 14, textAlign: 'left',
                  border: `2px solid ${selWord === i ? LX.blue : i in matches ? LX.lime : LX.border}`,
                  background: i in matches ? 'rgba(184,242,106,0.10)' : selWord === i ? 'rgba(91,139,255,0.10)' : LX.surfaceElev,
                  color: i in matches ? LX.lime : LX.text, fontWeight: 700,
                }}>
                  {p.word}
                </button>
              ))}
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {defs.map((d, i) => (
                <button key={i} disabled={Object.values(matches).includes(i)} onClick={() => !Object.values(matches).includes(i) && setSelDef(i)} style={{
                  padding: '14px 12px', borderRadius: 14, fontSize: 12, textAlign: 'left', lineHeight: 1.35,
                  border: `2px solid ${selDef === i ? LX.blue : Object.values(matches).includes(i) ? LX.lime : LX.border}`,
                  background: Object.values(matches).includes(i) ? 'rgba(184,242,106,0.10)' : selDef === i ? 'rgba(91,139,255,0.10)' : LX.surfaceElev,
                  color: Object.values(matches).includes(i) ? LX.lime : LX.text,
                }}>
                  {d.def}
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    function Result({ result, onHome }) {
      const { correct, total } = result;
      const pct = Math.round((correct / total) * 100);
      const great = pct >= 80;

      return (
        <div style={{
          minHeight: '100vh', background: LX.bg, color: LX.text,
          display: 'flex', flexDirection: 'column', padding: '56px 28px',
          alignItems: 'center', justifyContent: 'center', textAlign: 'center',
        }}>
          <div style={{ fontSize: 64, marginBottom: 6 }}>{great ? '🎉' : '💪'}</div>
          <div style={{ fontSize: 32, fontWeight: 900, marginTop: 8 }}>{great ? 'Bravo !' : 'Presque !'}</div>
          <div style={{ fontSize: 15, color: LX.textDim, marginTop: 8, maxWidth: 280 }}>
            {great ? 'Excellente performance !' : 'Encore un peu de pratique !'}
          </div>

          <div style={{ marginTop: 36, display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, width: '100%', maxWidth: 280 }}>
            {[
              { label: 'Score', value: `${correct}/${total}`, color: great ? LX.lime : LX.blue },
              { label: 'Précision', value: `${pct}%`, color: LX.amber },
              { label: 'XP', value: `+${correct * 10}`, color: LX.violet },
            ].map(({ label, value, color }) => (
              <div key={label} style={{ background: LX.surface, borderRadius: 16, padding: '14px 10px' }}>
                <div style={{ fontSize: 11, color: LX.textDim, fontWeight: 700, textTransform: 'uppercase' }}>{label}</div>
                <div style={{ fontSize: 22, fontWeight: 900, color, marginTop: 4 }}>{value}</div>
              </div>
            ))}
          </div>

          <div style={{ marginTop: 48 }}>
            <PillBtn onClick={onHome} variant="lime" style={{ padding: '16px 32px' }}>
              Retour
            </PillBtn>
          </div>
        </div>
      );
    }

    // Main App
    function App() {
      const [screen, setScreen] = useState('login');
      const [user, setUser] = useState(null);
      const [result, setResult] = useState(null);

      const handleLogin = (pseudo) => {
        setUser({ pseudo, prenom: 'Alex', streak: 14, level: 7, xp: 2380 });
        setScreen('home');
      };

      const handleExerciseResult = (res) => {
        setResult(res);
        setScreen('result');
      };

      if (!user) return <Login onLogin={handleLogin} />;

      const showTabBar = !['exercise', 'result'].includes(screen);

      return (
        <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', position: 'relative' }}>
          {screen === 'home' && <Home user={user} onGoto={setScreen} />}
          {screen === 'library' && <Library />}
          {screen === 'exercise' && <Exercise onDone={handleExerciseResult} onExit={() => setScreen('home')} />}
          {screen === 'result' && <Result result={result} onHome={() => setScreen('home')} />}
          {showTabBar && <TabBar tab={screen} onTab={setScreen} />}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
